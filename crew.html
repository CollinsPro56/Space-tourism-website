<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/crew.css" />

    <title>Frontend Mentor | Space tourism website</title>
  </head>
  <body>
    <header>
      <div class="symbols">
        <div class="logo">
          <img class="headsigns" src="assets/shared/logo.svg" alt="logo" />
        </div>
        <div id="icon-hamburger">
          <img
            class="headsigns"
            src="assets/shared/icon-hamburger.svg"
            alt=""
          />
        </div>
      </div>
      <hr class="rule" />
      <nav id="nav">
        <img
          class="cancelsign"
          id="icon-close"
          src="assets/shared/icon-close.svg"
          alt=""
        />
        <ul>
          <li>
            <a href="index.html"
              ><span class="digit">00</span>&nbsp;&nbsp; Home</a
            >
          </li>
          <li>
            <a href="destination.html"
              ><span class="digit">01</span>&nbsp;&nbsp; Destination</a
            >
          </li>
          <li>
            <a href="#"><span class="digit">02</span>&nbsp;&nbsp; Crew</a>
          </li>
          <li>
            <a href="technology.html"
              ><span class="digit">03</span>&nbsp;&nbsp; Technology</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="head-note">
        <span class="">02</span>&nbsp;&nbsp; Meet Your Crew
      </div>

      <div class="half">
        <p class="head">
          <span id="role">Commander</span> <br />
          <span id="name">Douglas Hurley</span>
        </p>
        <p class="text">
          Douglas Gerald Hurley is an American engineer, former Marine Corps
          pilot and former NASA astronaut. He launched into space for the third
          time as commander of Crew Dragon Demo-2.
        </p>
        <ul class="circle-containers">
          <li class="circle"></li>
          <li class="circle"></li>
          <li class="circle"></li>
          <li class="circle"></li>
        </ul>
      </div>
      <div class="img-div" id="">
        <img src="assets/crew/image-douglas-hurley.webp" alt="" id="image" />
      </div>
    </main>
    <footer></footer>
    <script src="js/script.js"></script>
    <script src="js/crew.js"></script>
  </body>
</html>
